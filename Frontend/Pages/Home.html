<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AIRA - Home</title>
    <link rel="stylesheet" href="../Components/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jersey+10&display=swap');

        .home-title {
            font-family: "Jersey 10", serif;
            font-size: 48px;
            color: #1e293b;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Styling for the Sliders */
        .slider-container {
            margin-top: 25px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 10px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #e1e8ed;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #a855f7;
        }

        /* Select styling to match inputs */
        select {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: #f8f9fa;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 15px;
            appearance: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="side-panel">
            <div style="font-size: 40px; margin-bottom: 10px;">⚙️</div>
            <h2 style="font-family: 'Jersey 10', serif; font-size: 42px;">Configuration</h2>
            <p>Customize your interview parameters to get the most accurate AI analysis.</p>
            <ul class="feature-list">
                <li>✓ Tailored Questions</li>
                <li>✓ Role-Specific Metrics</li>
                <li>✓ Adaptive Difficulty</li>
            </ul>
        </div>

        <div class="form-panel">
            <h1 class="home-title">Interview Setup</h1>

            <form id="setupForm">
                <div class="form-group">
                    <label>Degree</label>
                    <div class="input-container">
                        <span class="field-icon">🎓</span>
                        <select id="degree" required>
                            <option value="" disabled selected>Select your degree</option>
                            <option value="btech">B.Tech / B.E</option>
                            <option value="mtech">M.Tech / M.E</option>
                            <option value="bca">BCA / MCA</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Specialization</label>
                    <div class="input-container">
                        <span class="field-icon">🔬</span>
                        <input type="text" id="specialization" placeholder="e.g. Computer Science" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Job Preference</label>
                    <div class="input-container">
                        <span class="field-icon">💼</span>
                        <input type="text" id="job-pref" placeholder="e.g. Frontend Developer" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Years of Experience</label>
                    <div class="input-container">
                        <span class="field-icon">⏳</span>
                        <input type="number" id="experience" placeholder="e.g. 2" min="0" required>
                    </div>
                </div>

                <div class="slider-container">
                    <div class="slider-label">
                        <span>Difficulty</span>
                        <span id="diff-val">Medium</span>
                    </div>
                    <input type="range" id="difficulty" min="1" max="3" step="1" value="2">
                </div>

                <div class="slider-container">
                    <div class="slider-label">
                        <span>Number of Questions</span>
                        <span id="ques-val">10</span>
                    </div>
                    <input type="range" id="num-questions" min="5" max="20" step="1" value="10">
                </div>

                <button type="submit" class="submit-btn" style="margin-top: 30px; font-family: 'Jersey 10', serif; font-size: 24px;">START INTERVIEW</button>
            </form>
        </div>
    </div>

    <script src="../Assets/JS/auth.js"></script>
    <script>
        // Real-time slider value updates
        const diffSlider = document.getElementById('difficulty');
        const diffLabel = document.getElementById('diff-val');
        const diffLevels = { 1: "Easy", 2: "Medium", 3: "Hard" };

        diffSlider.oninput = function() {
            diffLabel.innerHTML = diffLevels[this.value];
        }

        const quesSlider = document.getElementById('num-questions');
        const quesLabel = document.getElementById('ques-val');

        quesSlider.oninput = function() {
            quesLabel.innerHTML = this.value;
        }
    </script>
</body>
</html>
