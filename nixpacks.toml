[phases.setup]
nixPkgs = ["libxcb", "xorg.libXcb", "xorg.libX11"]
aptPkgs = ["libxcb1", "libxcb1-dev", "libx11-6", "libglib2.0-0", "libgl1", "libsm6", "libxext6", "libxrender1"]
 
[phases.install]
cmds = [
    "pip install --no-cache-dir opencv-python-headless",
    "pip install --no-cache-dir -r requirements.txt"
]
 
[start]
cmd = "uvicorn Backend.main:app --host 0.0.0.0 --port $PORT"
 