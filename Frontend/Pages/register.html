<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Your Account</title>
    <link rel="stylesheet" href="../Components/style.css">
</head>
<body>
    <div class="auth-card">
        <div class="side-panel">
            <div style="font-size: 40px; margin-bottom: 10px;">📊</div>
            <h2>Join Our Platform</h2>
            <p>Start analyzing interviews with AI-powered insights and advanced analytics</p>
            <ul class="feature-list">
                <li>✓ Instant Feedback Analysis</li>
                <li>✓ Candidate Evaluation Tools</li>
                <li>✓ Custom Report Generation</li>
                <li>✓ Team Collaboration Features</li>
            </ul>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <div style="font-size: 40px;">📝</div>
                <h1>Create Your Account</h1>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-container">
                        <span class="field-icon">👤</span>
                        <input type="text" id="reg-username" placeholder="Choose a unique username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-container">
                        <span class="field-icon">📧</span>
                        <input type="email" id="email" placeholder="your.email@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-container">
                        <span class="field-icon">📱</span>
                        <input type="tel" id="phone" placeholder="10-digit mobile number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Date of Birth</label>
                    <div class="input-container">
                        <span class="field-icon">📅</span>
                        <input type="date" id="dob" placeholder="DD/MM/YYYY" style="padding-left: 45px;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-container">
                        <span class="field-icon">🔒</span>
                        <input type="password" id="reg-password" placeholder="Create a strong password" required>
                    </div>
                </div>

                <div style="margin-bottom: 20px; font-size: 13px;">
                    <input type="checkbox" id="terms" required>
                    <label for="terms" style="display: inline; margin-left: 5px;">I agree to Terms & Conditions</label>
                </div>

                <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 14px;">
                Already have an account? <a href="Login.html?dir=left" style="color: #6366f1; font-weight: 700; text-decoration: none;">Login Here</a>
            </div>
        </div>
    </div>

    <script src="../Assets/auth.js"></script>
</body>
</html>
